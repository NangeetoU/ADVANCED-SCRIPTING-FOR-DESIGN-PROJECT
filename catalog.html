<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BOOKBRALY - Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        @keyframes cardFadeUp {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .catalog-card-enter {
            opacity: 0;
            animation: cardFadeUp 0.45s ease-out forwards;
        }

        @keyframes catalogIntroFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes catalogOrbitSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 0.3; }
            60% { opacity: 0.7; }
            100% { transform: translate(-50%, -50%) rotate(180deg); opacity: 0; }
        }

        @keyframes catalogGridRise {
            0% { transform: translateY(40px) scale(0.98); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes catalogTitlePop {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes catalogIntroLift {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            70% { opacity: 1; transform: translateY(-12px) scale(1.02); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.08); visibility: hidden; }
        }

        .catalog-intro {
            background: radial-gradient(circle at top, rgba(44, 62, 80, 0.08), rgba(253, 252, 240, 0.98));
            animation: catalogIntroLift 1.6s ease-in forwards 2.7s;
        }

        .catalog-intro-wrap {
            position: relative;
            width: min(640px, 90vw);
            height: min(360px, 55vh);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: catalogIntroFade 0.6s ease-out forwards;
        }

        .catalog-intro-orbit {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 1px solid rgba(44, 62, 80, 0.2);
            border-radius: 999px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: catalogOrbitSpin 1.8s ease-out forwards 0.3s;
        }

        .catalog-intro-orbit--delay {
            width: 420px;
            height: 420px;
            border-style: dashed;
            animation-delay: 0.6s;
        }

        .catalog-intro-grid {
            position: absolute;
            inset: 14% 8%;
            background-image: linear-gradient(90deg, rgba(44, 62, 80, 0.08) 1px, transparent 1px),
                              linear-gradient(rgba(44, 62, 80, 0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            border-radius: 18px;
            animation: catalogGridRise 0.8s ease-out forwards 0.6s;
            opacity: 0;
        }

        .catalog-intro-title {
            position: relative;
            text-align: center;
            padding: 24px 28px;
            background: rgba(253, 252, 240, 0.85);
            border: 1px solid rgba(44, 62, 80, 0.15);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(44, 62, 80, 0.12);
            animation: catalogTitlePop 0.7s ease-out forwards 0.9s;
            opacity: 0;
        }

        .catalog-intro-kicker {
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            color: #2C3E50;
            margin-bottom: 10px;
        }

        .catalog-intro-title h2 {
            font-family: "Playfair Display", serif;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            color: #2C3E50;
            margin-bottom: 12px;
        }

        .catalog-intro-line {
            display: inline-block;
            width: 70px;
            height: 3px;
            background: #E67E22;
            margin-bottom: 10px;
        }

        .catalog-intro-sub {
            color: #1A1A1A;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @keyframes cartPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 126, 34, 0); }
            50% { transform: scale(0.95); box-shadow: 0 0 0 6px rgba(230, 126, 34, 0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(230, 126, 34, 0); }
        }

        .cart-btn.is-pressed {
            animation: cartPulse 0.35s ease-out;
        }
    </style>
</head>
<body id="home-page" class="scroll-smooth bg-[#FDFCF0]">

    <div id="intro-overlay" class="catalog-intro">
        <div class="catalog-intro-wrap">
            <div class="catalog-intro-orbit"></div>
            <div class="catalog-intro-orbit catalog-intro-orbit--delay"></div>
            <div class="catalog-intro-grid"></div>
            <div class="catalog-intro-title">
                <p class="catalog-intro-kicker">Curated Picks</p>
                <h2>Welcome to the Catalog</h2>
                <span class="catalog-intro-line"></span>
                <p class="catalog-intro-sub">Discover stories, ideas, and inspiration across every shelf.</p>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 w-full flex flex-wrap justify-between items-center gap-4 px-6 md:px-10 py-5 z-40 bg-[#2C3E50] shadow-md transition-all">
        <div class="text-2xl font-bold text-[#FDFCF0] tracking-widest font-serif">
            <span class="!text-[#E67E22]">THE</span> BOOKBRALY
        </div>
        <ul class="flex flex-wrap gap-4 text-[#FDFCF0] font-medium text-xs sm:text-sm w-full md:w-auto">
            <li><a href="index.html" class="hover:text-[#E67E22] transition pb-1">HOME</a></li>
            <li><a href="catalog.html" class="border-b-2 border-[#E67E22]">SHOP</a></li>
            <li><a href="summary.html" class="hover:text-[#E67E22] transition pb-1">SUMMARY</a></li>
        </ul>
        
    </nav>

    <section id="bestsellers" class="pt-20 sm:pt-24 pb-16 px-6 md:px-20 max-w-7xl mx-auto relative z-10">
        <div class="mb-12 border-b-2 border-[#BDC3C7] pb-4">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                <h2 class="text-3xl text-[#2C3E50] font-bold font-serif">Book Catalog</h2>
                <div class="w-full md:w-64">
                    <label for="type-filter" class="block text-sm text-[#2C3E50] font-semibold mb-1">Sort by type</label>
                    <select id="type-filter" class="w-full border border-[#BDC3C7] rounded px-3 py-2 bg-white text-[#2C3E50]">
                        <option value="all">All types</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
            <p id="cart-feedback" class="hidden text-sm text-[#2C3E50] font-semibold"></p>
            <p class="text-sm text-[#2C3E50]">Cart items: <span id="cart-count" class="font-bold">0</span></p>
        </div>
        <div id="book-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        <p id="empty-state" class="hidden text-center text-[#2C3E50] font-semibold mt-8">No books found for this type.</p>
    </section>

    <script src="js/catalog.js"></script>
</body>
</html>
